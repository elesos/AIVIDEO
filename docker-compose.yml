x-common-volumes: &common-volumes
  - ./:/AIVIDEO

services:
  # WebUI 已禁用，仅部署 API
  # webui:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: "moneyprinterturbo-webui"
  #   ports:
  #     - "127.0.0.1:8501:8501"
  #   command: [ "streamlit", "run", "./webui/Main.py","--browser.serverAddress=127.0.0.1","--server.enableCORS=True","--browser.gatherUsageStats=False","--server.showEmailPrompt=False" ]
  #   volumes: *common-volumes
  #   restart: always
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "moneyprinterturbo-api"
    ports:
      - "127.0.0.1:8502:8080"
    # Caddy exposes this service below /api and strips that prefix before
    # proxying. Tell FastAPI about the external prefix so Swagger UI loads
    # /api/openapi.json instead of the Streamlit route at /openapi.json.
    command: [ "uvicorn", "app.asgi:app", "--host", "0.0.0.0", "--port", "8080", "--root-path", "/api" ]
    volumes: *common-volumes
    restart: always
